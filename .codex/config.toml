# Codex Helper baseline config template.
# Copy this file and merge selectively into ~/.codex/config.toml.

model = "gpt-5.4"
model_reasoning_effort = "medium"

# Allow common alternative project-doc filenames if AGENTS.md is absent.
project_doc_fallback_filenames = ["TEAM_GUIDE.md", ".agents.md"]
project_doc_max_bytes = 65536

[agents]
max_threads = 6
max_depth = 1

# Optional: set to cap runtime for fan-out tasks.
# job_max_runtime_seconds = 1800
